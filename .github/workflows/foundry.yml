name: CI (Node + Foundry)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Verify Foundry
        run: |
          forge --version
          cast --version

      - name: Run tests
        run: npm test

      - name: Verify on-chain gate state
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          K1_ADDRESS: "0x01152d5c7467204bFa015061097b193CbceA8ca9"
          K2_ADDRESS: "0x55c73995c4194Dd87CC5aCbC4E45f48c807f4553"
          CLEAN_WALLET: "0xA0eb06a5fab172860837C4D68e75F339896500b5"
        run: node scripts/verify-gate.js
